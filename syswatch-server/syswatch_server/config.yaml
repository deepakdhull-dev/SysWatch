server:
  grpc_host: "0.0.0.0"
  grpc_port: 50051
  http_host: "0.0.0.0"
  http_port: 8080
  # Prometheus metrics for syswatch-server process itself
  metrics_port: 9091

database:
  url: "postgresql+asyncpg://syswatch:changeme@localhost:5432/syswatch"
  pool_size: 10
  max_overflow: 5
  pool_timeout: 30

tls:
  ca_cert: "/etc/syswatch/pki/ca/ca.crt"
  server_cert: "/etc/syswatch/pki/server/server.crt"
  server_key: "/etc/syswatch/pki/server/server.key"

jwt:
  private_key: "/etc/syswatch/server/jwt/jwt.key"
  public_key: "/etc/syswatch/server/jwt/jwt.pub"
  algorithm: "RS256"
  access_token_expire_minutes: 15
  refresh_token_expire_days: 7

auth:
  # Set by install.sh from the --admin-username prompt (default: admin)
  admin_username: "admin"
  # bcrypt hash of the admin password — set during install or via:
  #   syswatch set-password
  admin_password_hash: "$2b$12$CHANGEME"

# Controls agent certificate issuance (syswatch bundle --name <hostname>)
pki:
  ca_key: "/etc/syswatch/pki/ca/ca.key"
  ca_cert: "/etc/syswatch/pki/ca/ca.crt"
  agent_cert_validity_days: 365

prometheus:
  url: "http://localhost:9090"

grafana:
  url: "http://localhost:3000"
  admin_user: "admin"
  admin_password: "syswatch"

alertmanager:
  url: "http://localhost:9093"

logging:
  level: "INFO" # DEBUG | INFO | WARNING | ERROR
  format: "json" # json | text
