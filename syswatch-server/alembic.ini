# alembic.ini — Alembic configuration for syswatch-server
# ==========================================================
#
# WHAT IS ALEMBIC?
# -----------------
# Alembic is a database migration tool for Python. A "migration" is a versioned
# script that describes a change to the database schema — CREATE TABLE, ADD COLUMN,
# CREATE INDEX, etc. Alembic tracks which migrations have been applied and runs
# only the ones that haven't been yet.
#
# WHY NOT JUST RUN THE SQL MANUALLY?
# ------------------------------------
# Manual SQL scripts break down when:
#   - Multiple environments (dev, staging, prod) diverge.
#   - Multiple developers each run different subsets of scripts.
#   - You need to roll back a bad schema change.
#
# Alembic solves this with:
#   - A version table (alembic_version) in the database that tracks the current
#     revision. You always know exactly which migrations have been applied.
#   - A linear (or branching) chain of revision IDs. Each migration knows its
#     predecessor (down_revision) and successor (revision).
#   - upgrade() / downgrade() functions per migration for forward and rollback.
#
# COMMANDS:
#   alembic upgrade head        — apply all unapplied migrations (forward to latest)
#   alembic downgrade -1        — roll back the most recent migration
#   alembic current             — show which revision the DB is at
#   alembic history             — list all migrations and their status
#   alembic revision -m "name"  — generate a new migration file stub
#
# HOW THIS INTEGRATES WITH install.sh:
#   install.sh (server path) runs:
#     cd /opt/syswatch-server
#     SYSWATCH_CONFIG=/etc/syswatch/server/config.yaml alembic upgrade head
#   This applies all migrations in migrations/versions/ to the PostgreSQL database.

[alembic]
# Where to find env.py, script.py.mako, and the versions/ directory.
# Relative to the location of this alembic.ini file (syswatch-server/).
script_location = syswatch_server/migrations

# sqlalchemy.url is intentionally left as a placeholder.
# env.py reads the real DSN from /etc/syswatch/server/config.yaml or
# from the SYSWATCH_DB_DSN environment variable — never from this file.
# This prevents credentials from being stored in a world-readable file.
# The +asyncpg suffix tells SQLAlchemy to use the asyncpg driver.
sqlalchemy.url = postgresql+asyncpg://placeholder

# Migration file naming template.
# %(year)d%(month).2d%(day).2d_%(hour).2d%(minute).2d%(second).2d — timestamp
# %(rev)s  — the revision ID (first 12 chars of the hash)
# %(slug)s — the slugified -m "message" passed to alembic revision
# Result: "20240615_143022_abc123_add_retention.py"
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Encoding of migration files.
prepend_sys_path = .

# Timezone used in migration file timestamps.
# UTC avoids daylight-saving time ambiguity.
timezone = UTC

# Truncate long revision IDs in branch labels to this many characters.
truncate_slug_length = 40

# Revision IDs are NOT compared as integers (e.g. rev 0001 < 0002).
# Alembic uses the down_revision chain, not lexicographic ordering.
revision_environment = false

# If true, alembic will raise an error if there are multiple head revisions
# (diverged migration history). Keep true to enforce a linear history.
sourceless = false

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
