[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "syswatch-agent"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "grpcio>=1.63.0",
    "protobuf>=6.30.0,<7.0.0",
    "psutil>=6.0.0",
    "pyyaml>=6.0.2",
    "structlog>=24.4.0",
]

[project.scripts]
# Management CLI: start / stop / status / update / service add|delete|list
syswatch-agent = "syswatch_agent.cli:main"
# Daemon process: what systemd calls via ExecStart
syswatch-agent-daemon = "syswatch_agent.main:main"

[project.optional-dependencies]
dev = [
    "grpcio-tools>=1.63.0,<1.82.0",
#    "pytest>=8.3.0",
#    "pytest-asyncio>=0.24.0",
#    "pytest-cov>=5.0.0",
    "mypy>=1.11.0",
    "ruff>=0.6.0",
]

# ── Hatchling ─────────────────────────────────────────────────────────────────
# Proto generated files are produced by `make proto` before building the wheel.
# They are included in the wheel (non-editable install requires them present).
# Excluded from sdist — consumers regenerate from proto/syswatch.proto source.
[tool.hatch.build.targets.wheel]
packages = ["syswatch_agent"]

[tool.hatch.build.targets.sdist]
exclude = [
    "syswatch_agent/proto/syswatch_pb2.py",
    "syswatch_agent/proto/syswatch_pb2_grpc.py",
]

# ── Mypy ──────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.13"
strict = true

[[tool.mypy.overrides]]
module = ["syswatch_agent.proto.*", "grpc.*", "psutil.*", "yaml.*"]
ignore_missing_imports = true

# ── Ruff ──────────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py313"
line-length = 88
exclude = ["syswatch_agent/proto/syswatch_pb2*.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "ANN"]
ignore = [
    "ANN101",  # self annotation
    "ANN102",  # cls annotation
]

# ── Pytest ────────────────────────────────────────────────────────────────────
