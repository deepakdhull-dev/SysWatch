[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "syswatch-agent"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "grpcio>=1.63.0",
    "protobuf>=6.30.0,<7.0.0",
    "psutil>=6.0.0",
    "pyyaml>=6.0.2",
    "structlog>=24.4.0",
]

[project.scripts]
# Management CLI: start / stop / status / update / service add|delete|list
syswatch-agent = "syswatch_agent.cli:main"
# Daemon process: what systemd calls via ExecStart
syswatch-agent-daemon = "syswatch_agent.main:main"

[project.optional-dependencies]
dev = [
    "grpcio-tools>=1.63.0,<1.82.0",
#    "pytest>=8.3.0",
#    "pytest-asyncio>=0.24.0",
#    "pytest-cov>=5.0.0",
    "mypy>=1.11.0",
    "ruff>=0.6.0",
]

# ── Hatchling ─────────────────────────────────────────────────────────────────
# Proto generated files are produced by `make proto` before building the wheel.
# They must be present in BOTH the sdist and the wheel: `uv build` builds the
# wheel from the sdist, not the source tree directly, so excluding them from
# the sdist (as an earlier version of this file did) silently breaks the
# wheel too.
[tool.hatch.build.targets.wheel]
packages = ["syswatch_agent"]
# Force-include: proto/*.py are build-time generated by `make proto` and
# deliberately untracked in git, so hatchling's default (git-tracked-files-
# only) wheel packaging silently drops them without this. Confirmed via a
# real `uv build` + install: omitting this produces a wheel that imports
# with a confusing circular-import error because the files simply aren't
# there.
artifacts = [
    "syswatch_agent/proto/syswatch_pb2.py",
    "syswatch_agent/proto/syswatch_pb2_grpc.py",
]

[tool.hatch.build.targets.sdist]
# NOTE: proto/*.py is deliberately NOT excluded here even though it's
# untracked in git / build-time generated by `make proto`. `uv build` builds
# the wheel FROM the sdist, not directly from source — excluding these here
# means the wheel-build stage has nothing to pull them from regardless of
# the wheel target's `artifacts` force-include. Confirmed via a real `uv
# build` reproduction: this exact exclude caused the agent (and server)
# wheel to silently ship without syswatch_pb2.py, crashing at import time
# with a misleading circular-import error.
exclude = []

# ── Mypy ──────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.13"
strict = true

[[tool.mypy.overrides]]
module = ["syswatch_agent.proto.*", "grpc.*", "psutil.*", "yaml.*"]
ignore_missing_imports = true

# ── Ruff ──────────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py313"
line-length = 88
exclude = ["syswatch_agent/proto/syswatch_pb2*.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "ANN"]
ignore = [
    "ANN101",  # self annotation
    "ANN102",  # cls annotation
]

# ── Pytest ────────────────────────────────────────────────────────────────────
#[tool.pytest.ini_options]
#asyncio_mode = "auto"
#testpaths = ["tests"]
#pythonpath = ["."]

#[tool.coverage.run]
#source = ["syswatch_agent"]
#omit = ["syswatch_agent/proto/syswatch_pb2*.py"]
